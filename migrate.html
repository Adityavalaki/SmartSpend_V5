  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .log { margin-top:24px; background:#07090f; border-radius:12px; padding:16px; max-height:320px; overflow-y:auto; font-family:monospace; font-size:12px; line-height:1.8; }
  .ok  { color:#1de982; }
  .err { color:#ff4f6d; }
  .inf { color:#6b82a0; }
  .done { text-align:center; margin-top:20px; padding:16px; background:rgba(0,212,184,.08); border:1px solid rgba(0,212,184,.2); border-radius:12px; color:#00d4b8; font-weight:700; display:none; }
</style>

];

var WALLETS = [
  { name: 'cash',    balance: 500 },
  { name: 'digital', balance: 3500 }
];

var SETTINGS = [
  { key: 'budget_limit',    value: '6000' },
  { key: 'alert_threshold', value: '80'   },
  { key: 'savings_target',  value: '500'  },
  { key: 'currency',        value: '₹'   }
];

var TRANSFERS = [
  { from_wallet:'cash',    to_wallet:'digital', amount:40,  note:'', tx_date:'2026-03-09', created_at:'2026-03-09T19:40:58+00:00' },
  { from_wallet:'digital', to_wallet:'cash',    amount:500, note:'', tx_date:'2026-03-11', created_at:'2026-03-11T12:54:43+00:00' }
];

var GOALS = [
  { name:'Shoes', target_amount:2000, saved_amount:0, target_date:'2026-07-10', created_at:'2026-03-10T15:33:05+00:00' }
];

// ── Log helper ────────────────────────────────────
function log(msg, type) {
  var div = document.getElementById('log');
  var span = document.createElement('div');
  span.className = type || 'inf';
  span.textContent = msg;
  div.appendChild(span);
  div.scrollTop = div.scrollHeight;
}

function col(name) {
  return db.collection('users').doc(UID).collection(name);
}

// ── Main Migration ────────────────────────────────
async function runMigration() {
  var btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Migrating...';
  document.getElementById('log').innerHTML = '';

  try {
    // 1. Wallets
    log('📂 Migrating wallets...', 'inf');
    for (var w of WALLETS) {
      await col('wallets').doc(w.name).set({ balance: w.balance });
      log('✓ Wallet: ' + w.name + ' = ₹' + w.balance, 'ok');
    }

    // 2. Settings
    log('⚙️ Migrating settings...', 'inf');
    for (var s of SETTINGS) {
      await col('settings').doc(s.key).set({ value: s.value });
      log('✓ Setting: ' + s.key + ' = ' + s.value, 'ok');
    }

    // 3. Transactions
    log('💸 Migrating ' + TRANSACTIONS.length + ' transactions...', 'inf');
    for (var i = 0; i < TRANSACTIONS.length; i++) {
      var t = TRANSACTIONS[i];
      await col('transactions').add(t);
      log('✓ [' + (i+1) + '/' + TRANSACTIONS.length + '] ' + t.tx_date + ' — ' + t.description + ' ₹' + t.amount, 'ok');
    }

    // 4. Transfers
    log('🔄 Migrating transfers...', 'inf');
    for (var tr of TRANSFERS) {
      await col('transfers').add(tr);
      log('✓ Transfer: ' + tr.from_wallet + ' → ' + tr.to_wallet + ' ₹' + tr.amount, 'ok');
    }

    // 5. Goals
    log('🎯 Migrating goals...', 'inf');
    for (var g of GOALS) {
      await col('goals').add(g);
      log('✓ Goal: ' + g.name + ' ₹' + g.target_amount, 'ok');
    }

    log('', 'inf');
    log('🎉 All data migrated successfully!', 'ok');
    document.getElementById('done').style.display = 'block';
    btn.textContent = '✅ Done!';

  } catch(e) {
    log('❌ Error: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = '🔁 Retry Migration';
  }
}
</script>
